---
layout: default
---

<style>
  h3 {
    display:none;
  }
  
  #latest {
    width: 320px;
    margin-bottom: 0;
    margin-right: 0;
    margin-left: -160px;
    margin-top: 0;
    padding: 0;
    position: relative;
    left: 50%;
  }
  
  sub, sup {
    font-size: inherit;
  }
</style>

<h3>Library</h3>

  <div id="latest">
  {% for post in site.posts offset:0 limit:1 %}
    <h4><a href="{{ post.url }}">{{ post.title }}</a></h4>
    <div class="content">{{ post.content | newline_to_br | strip_newlines | replace: "(", "<i>" | replace: ")", "</i>" | replace: "[", "<b>" | replace: "]", "</b>" }}</div>
  {% endfor %}
  </div>
